limit_req_zone $binary_remote_addr zone=personal_limit:10m rate=5r/s;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    limit_req zone=personal_limit burst=10 nodelay;

    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
        client_max_body_size 10M;
    }

    # Old kitchen app removed; send bookmarks to recipes
    location = /p/kitchen { return 301 /p/recipes; }
    location = /p/kitchen.html { return 301 /p/recipes; }

    # Redirect *.html to clean URLs (no extension)
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    location /p/ {
        try_files $uri $uri/ $uri.html =404;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }
}
