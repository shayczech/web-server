# ------------------------------------------------------------------------------
# Nginx config: rate limiting, HTTP (redirect + ACME), HTTPS (SSL + proxy to API).
# Deployed as /etc/nginx/conf.d/default.conf (included in http { }).
# ------------------------------------------------------------------------------

limit_req_zone $binary_remote_addr zone=personal_limit:10m rate=5r/s;
limit_req_status 429;

server {
    listen 80;
    server_name shayleeczech.com www.shayleeczech.com;
    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name shayleeczech.com www.shayleeczech.com;

    ssl_certificate /etc/letsencrypt/live/shayleeczech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shayleeczech.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;
    limit_req zone=personal_limit burst=10 nodelay;

    location /api/stats {
        proxy_pass http://localhost:3000/api/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}