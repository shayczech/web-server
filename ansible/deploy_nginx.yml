---
# ------------------------------------------------------------------------------
# Deploy Secure Portfolio Web Server (HTTPS)
# Single play: install packages, deploy content, run Certbot, deploy API + Nginx.
# ------------------------------------------------------------------------------

- name: Deploy Secure Portfolio Web Server (HTTPS)
  hosts: webservers
  tasks:

    # --- 1. Installation and setup ---
    - name: Free disk space early (apt, Docker, Trivy cache, logs)
      ansible.builtin.shell: |
        apt-get clean -y 2>/dev/null || true
        apt-get autoclean -y 2>/dev/null || true
        docker builder prune -af 2>/dev/null || true
        docker image prune -af 2>/dev/null || true
        docker system prune -af 2>/dev/null || true
        trivy image --clear-cache 2>/dev/null || true
        rm -rf /root/.cache/trivy /tmp/trivy-* 2>/dev/null || true
        journalctl --vacuum-time=3d 2>/dev/null || true
      become: yes

    - name: Clean up old Trivy repo files and cache
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/trivy.list
        - /etc/apt/trusted.gpg.d/trivy.gpg
        - /var/cache/apt/pkgcache.bin
      ignore_errors: true
      become: true

    - name: Ensure essential packages are installed
      ansible.builtin.apt:
        name:
          - certbot
          - python3-certbot-nginx
          - python3-certbot-dns-route53
          - ca-certificates
          - curl
          - gnupg
          - jq
          - python3-pip
          - lsof
          - net-tools
          - apt-transport-https
          - lsb-release
        state: present
        update_cache: yes
      become: yes

    - name: Download Trivy GPG key to keyrings location
      ansible.builtin.get_url:
        url: https://aquasecurity.github.io/trivy-repo/deb/public.key
        dest: /usr/share/keyrings/trivy.asc
        mode: '0644'
        force: true
      become: yes
      
    - name: Add Trivy APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/trivy.asc] https://aquasecurity.github.io/trivy-repo/deb {{ ansible_facts['distribution_release'] }} main"
        state: present
        filename: trivy
      become: yes
      
    - name: Install Trivy
      ansible.builtin.apt:
        name: trivy
        state: present
        update_cache: yes
      become: yes
      
    - name: Install Docker (official convenience script)
      ansible.builtin.shell: 
        cmd: curl -fsSL https://get.docker.com | sh
      become: yes

    - name: Install Python Docker module
      ansible.builtin.apt:
        name: python3-docker
        state: present
      become: yes

    # --- 2. Deploy content and prepare host directories ---
    - name: Create required directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /app/html
        - /app/config
        - /app/api
        - /etc/letsencrypt/
        - /root/.aws
        - /var/log/nginx
      become: yes

    - name: Install CloudWatch Agent dependencies
      ansible.builtin.apt:
        name: unzip
        state: present
      become: yes

    - name: Download CloudWatch Agent package
      ansible.builtin.get_url:
        url: https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
        dest: /tmp/amazon-cloudwatch-agent.deb
      become: yes

    - name: Install CloudWatch Agent
      ansible.builtin.apt:
        deb: /tmp/amazon-cloudwatch-agent.deb
        state: present
      become: yes
      
    - name: Copy CloudWatch Agent configuration file
      ansible.builtin.copy:
        src: files/amazon-cloudwatch-agent.json
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
        owner: root
        group: root
        mode: '0644'
      become: yes

    - name: Start CloudWatch Agent service
      ansible.builtin.service:
        name: amazon-cloudwatch-agent
        state: started
        enabled: true
      become: yes

    - name: Deploy index.html
      ansible.builtin.copy:
        src: files/index.html 
        dest: /app/html/index.html
        owner: root
        group: root
        mode: '0644'
      notify: Restart Nginx Container
      become: yes
      
    - name: Deploy resume.html
      ansible.builtin.copy:
        src: files/resume.html 
        dest: /app/html/resume.html
        owner: root
        group: root
        mode: '0644'
      notify: Restart Nginx Container
      become: yes

    - name: Deploy grc.html
      ansible.builtin.copy:
        src: files/grc.html 
        dest: /app/html/grc.html
        owner: root
        group: root
        mode: '0644'
      notify: Restart Nginx Container
      become: yes

    - name: Copy Node.js API files to host
      ansible.builtin.copy:
        src: files/api/ 
        dest: /app/api/
        owner: root
        group: root
        mode: '0755'
      become: yes
      
    - name: Copy .trivyignore to API directory
      ansible.builtin.copy:
        src: .trivyignore
        dest: /app/api/.trivyignore
        owner: root
        group: root
        mode: '0644'
      become: yes

    # --- 3. Security and credentials ---
    - name: Install PyLint for policy-as-code check
      ansible.builtin.apt:
        name: pylint 
        state: present
      become: yes

    - name: Run policy-as-code check (PyLint)
      ansible.builtin.shell: |
        pylint --disable=all --enable=W0107 /app/api/server.js || true
      args:
        chdir: /app/api/
      changed_when: false
      become: yes

    - name: Check certificate and obtain or renew with Certbot (Route 53 DNS)
      ansible.builtin.shell: |
        if openssl x509 -checkend 2592000 -noout -in /etc/letsencrypt/live/shayleeczech.com/fullchain.pem > /dev/null 2>&1; then
          echo "Certificate is valid for more than 30 days. Skipping renewal."
          exit 0
        else
          echo "Certificate expiring soon or does not exist. Running Certbot."
          certbot certonly --dns-route53 -d shayleeczech.com -d www.shayleeczech.com --non-interactive --agree-tos -m shayleeczech@gmail.com --no-self-upgrade --force-renewal
        fi
      register: certbot_result
      changed_when: "'Certificate is valid' not in certbot_result.stdout" 
      become: yes

    # --- 4. Deploy API container ---
    - name: Build Stats API image (no cache)
      ansible.builtin.shell: |
        docker build --no-cache -t stats-api:latest --build-arg BUILD_TIMESTAMP={{ ansible_facts['date_time']['epoch'] }} -f /app/api/Dockerfile /app/api/
      become: yes

    - name: Free disk space before Trivy (keep stats-api:latest)
      ansible.builtin.shell: |
        docker builder prune -af 2>/dev/null || true
        docker image prune -f 2>/dev/null || true
        trivy image --clear-cache 2>/dev/null || true
        rm -rf /root/.cache/trivy /tmp/trivy-* 2>/dev/null || true
        apt-get clean -y 2>/dev/null || true
      become: yes

    - name: Run Trivy scan (JSON for security score and vuln gate)
      ansible.builtin.shell: |
        trivy image --format json --exit-code 0 --ignore-unfixed --severity HIGH,CRITICAL -o /tmp/trivy-stats-api.json stats-api:latest
      args:
        chdir: /app/api/
      register: trivy_json_run
      changed_when: false
      become: yes

    - name: Compute security score from Trivy JSON and write file
      ansible.builtin.shell: |
        critical=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' /tmp/trivy-stats-api.json 2>/dev/null || echo 0)
        high=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' /tmp/trivy-stats-api.json 2>/dev/null || echo 0)
        score=$((100 - ${critical:-0}*15 - ${high:-0}*5))
        [ "$score" -lt 0 ] && score=0
        mkdir -p /app/api
        echo "{\"securityScore\": $score}" > /app/api/security-score.json
        chmod 644 /app/api/security-score.json
      args:
        executable: /bin/bash
      become: yes

    - name: Fail deploy if Trivy found unignored HIGH/CRITICAL
      ansible.builtin.shell: |
        total=$(jq '[.Results[]?.Vulnerabilities[]?] | length' /tmp/trivy-stats-api.json 2>/dev/null || echo 0)
        if [ "$total" -ne 0 ]; then
          echo "Trivy found $total HIGH/CRITICAL vulnerability(ies). Add to ansible/.trivyignore if accepted:"
          jq -r '[.Results[]?.Vulnerabilities[]? | .VulnerabilityID] | unique | .[]' /tmp/trivy-stats-api.json 2>/dev/null || true
          exit 1
        fi
      register: trivy_gate
      failed_when: trivy_gate.rc != 0
      become: yes

    - name: Start Stats API container
      community.docker.docker_container:
        name: stats-api
        image: stats-api:latest
        state: started
        restart_policy: always
        network_mode: "host"
        recreate: true
        volumes:
          - /app/api/security-score.json:/app/security-score.json:ro
      become: yes

    - name: Verify API is listening on port 3000
      ansible.builtin.wait_for:
        port: 3000
        host: 127.0.0.1 
        state: started
        delay: 5    
        timeout: 60 
      changed_when: false
      become: yes

    # --- 5. Deploy Nginx and finalize ---
    - name: Deploy Nginx SSL config
      ansible.builtin.copy:
        src: nginx_ssl.conf
        dest: /app/config/nginx.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart Nginx Container
      become: yes

    - name: Free ports 80/443 and restart Docker before Nginx
      ansible.builtin.shell: |
        fuser -k -n tcp 80 || true
        fuser -k -n tcp 443 || true
        systemctl restart docker || true
        sleep 10
      become: yes
      ignore_errors: yes

    - name: Start Nginx container (SSL, host network)
      community.docker.docker_container:
        name: portfolio-web
        image: nginx:latest
        state: started
        restart_policy: always
        volumes:
          - /app/html:/usr/share/nginx/html:ro
          - /etc/letsencrypt:/etc/letsencrypt:ro
          - /app/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
          - /var/log/nginx:/var/log/nginx
        network_mode: "host"
        recreate: true
      become: yes

    - name: Wait for Nginx access log (for CloudWatch agent)
      ansible.builtin.wait_for:
        path: /var/log/nginx/access.log
        state: present
        timeout: 30
      become: yes
      ignore_errors: true

    - name: Restart CloudWatch Agent to pick up Nginx log
      ansible.builtin.service:
        name: amazon-cloudwatch-agent
        state: restarted
      become: yes

    - name: Ensure CloudWatch Agent is started and enabled
      ansible.builtin.systemd:
        name: amazon-cloudwatch-agent
        state: started
        enabled: true
        daemon_reload: true
      become: yes

    - name: "Cron: restart CloudWatch Agent daily"
      ansible.builtin.cron:
        name: "Restart CloudWatch Agent daily"
        minute: "0"
        hour: "3"
        job: "/usr/bin/systemctl restart amazon-cloudwatch-agent"
        user: root
      become: yes

  handlers:
    - name: Restart Nginx Container
      community.docker.docker_container:
        name: portfolio-web
        image: nginx:latest
        state: started
        restart_policy: always
        volumes:
          - /app/html:/usr/share/nginx/html:ro
          - /etc/letsencrypt:/etc/letsencrypt:ro
          - /app/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
          - /var/log/nginx:/var/log/nginx
        network_mode: "host"
        recreate: true
      become: yes
