name: DevSecOps Portfolio CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'site/**'
      - '**.md'
      - 'README*'
  workflow_dispatch: # Allows manual triggering (full pipeline)

# --- PERMISSIONS YOU ADDED FOR OIDC ---
permissions:
  id-token: write  # Allows the job to request an OIDC token
  contents: read   # Allows the job to checkout the code

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Setup Node.js and Install Dependencies for Snyk (No changes) ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Node.js Dependencies (for Snyk Scan)
        run: npm install
        working-directory: site/api/

      # --- Snyk SAST Scan (No changes) ---
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} 
        with:
          command: monitor site/api/
          args: --fail-on=high

      - name: Clean up node_modules to prevent Ansible copy hang
        run: rm -rf site/api/node_modules
        
      # --- OIDC Configuration (No changes) ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::643913568924:role/GitHub-Actions-Deploy-Role # Your OIDC Role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsSession

      # --- PHASE 1: Terraform (IaC) (No changes) ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: infra/

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve
        working-directory: infra/

      # --- Write IaC resource count to SSM (for live stats on site) ---
      - name: Update IaC resource count in SSM
        working-directory: infra
        run: |
          COUNT=$(terraform state list 2>/dev/null | wc -l | tr -d ' ')
          aws ssm put-parameter --name "/web-server/iac-resource-count" --value "$COUNT" --type String --overwrite

      # --- ASG instance refresh (deploys new userdata to all instances) ---
      - name: Get ASG name
        id: asg
        working-directory: infra
        run: |
          ASG_NAME=$(terraform output -raw asg_name)
          echo "name=${ASG_NAME}" >> $GITHUB_OUTPUT

      - name: Start ASG instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}'

      - name: Wait for instance refresh to complete
        run: |
          # Allow up to 50 min for launch, warmup, and ALB health checks.
          # Print status reason + progress every poll so failures are diagnosable.
          for i in $(seq 1 100); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
              --query 'InstanceRefreshes[0].Status' --output text)
            PCT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
              --query 'InstanceRefreshes[0].PercentageComplete' --output text)
            REASON=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
              --query 'InstanceRefreshes[0].StatusReason' --output text)
            INSTANCES_LEFT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
              --query 'InstanceRefreshes[0].InstancesToUpdate' --output text)
            echo "Refresh status: $STATUS | complete: ${PCT}% | instances remaining: $INSTANCES_LEFT"
            echo "Status reason: $REASON"
            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh complete."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed with status: $STATUS"
              exit 1
            fi
            sleep 30
          done
          echo "Timed out waiting for instance refresh."
          echo "Final ASG refresh state:"
          aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
            --max-items 1
          exit 1