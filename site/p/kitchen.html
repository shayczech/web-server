<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shay's Kitchen</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a1410'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='38' font-style='italic' fill='%23f5f0e8' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf7f2;
    --parchment: #ede5d4;
    --ink: #1a1410;
    --brown: #6b4c35;
    --rust: #c4622d;
    --sage: #6b7c5e;
    --gold: #c9913d;
    --muted: #8a7968;
    --border: #d4c9b5;
    --shadow: rgba(26,20,16,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 13px;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .login-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 48px 52px;
    width: 420px;
    text-align: center;
  }

  .login-card .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
  }

  .login-card .tagline {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .login-field {
    margin-bottom: 14px;
    text-align: left;
  }

  .login-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .login-field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .login-field input:focus { border-color: var(--brown); }

  .login-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
  }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .btn-login:hover { background: var(--brown); }

  .login-error {
    color: var(--rust);
    font-size: 11px;
    margin-top: 12px;
    min-height: 16px;
  }

  /* ── APP SHELL ── */
  #app { display: none; }

  .app-header {
    background: var(--ink);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.04em;
  }

  .app-nav {
    display: flex;
    gap: 2px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }

  .nav-btn:hover { color: var(--cream); }
  .nav-btn.active { color: var(--gold); background: rgba(255,255,255,0.04); }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-sm {
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.2s;
  }

  .btn-ghost {
    background: none;
    border-color: rgba(255,255,255,0.2);
    color: var(--muted);
  }

  .btn-ghost:hover { border-color: var(--cream); color: var(--cream); }

  /* ── MAIN CONTENT ── */
  .main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  .section-title em {
    font-style: italic;
    color: var(--brown);
  }

  .btn-primary {
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 9px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-primary:hover { background: var(--brown); }

  .btn-secondary {
    background: none;
    color: var(--ink);
    border: 1px solid var(--border);
    padding: 9px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--brown); color: var(--brown); }

  .btn-danger {
    background: none;
    color: var(--rust);
    border: 1px solid transparent;
    padding: 4px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-danger:hover { border-color: var(--rust); }

  /* ── PANTRY ── */
  .pantry-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    background: var(--warm-white);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }

  .search-input:focus { border-color: var(--brown); }

  .filter-select {
    padding: 9px 14px;
    border: 1px solid var(--border);
    background: var(--warm-white);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }

  /* Pantry: vertical list with category headers */
  #pantry-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .pantry-category-group {
    margin-bottom: 28px;
  }

  .pantry-category-group:last-child { margin-bottom: 0; }

  .pantry-category-group.collapsed .pantry-category-body { display: none; }

  .pantry-subcategory-group {
    margin-bottom: 16px;
  }

  .pantry-subcategory-group:last-child { margin-bottom: 0; }

  .pantry-subcategory-group.collapsed .pantry-grid { display: none; }

  .pantry-subcategory-title {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--border);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 18px;
    transition: color 0.15s;
  }

  .pantry-subcategory-title:hover { color: var(--brown); }

  .pantry-subcategory-chevron {
    font-size: 9px;
    transition: transform 0.2s;
  }

  .pantry-subcategory-group.collapsed .pantry-subcategory-chevron { transform: rotate(-90deg); }

  .pantry-category-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s;
  }

  .pantry-category-title:hover { color: var(--brown); }

  .pantry-category-chevron {
    font-size: 10px;
    transition: transform 0.2s;
  }

  .pantry-category-group.collapsed .pantry-category-chevron { transform: rotate(-90deg); }

  .pantry-categories-panel {
    display: none;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px 20px;
    align-items: center;
  }

  .pantry-categories-panel.open { display: flex; }

  .pantry-categories-panel label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
  }

  .pantry-categories-panel input[type="checkbox"] { cursor: pointer; }

  .pantry-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── PANTRY CHIP ── */
  .pantry-item {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px 0 10px;
    height: 36px;
    cursor: grab;
    transition: all 0.15s;
    user-select: none;
    position: relative;
  }

  .pantry-item:hover {
    border-color: var(--brown);
    box-shadow: 0 1px 6px rgba(26,20,16,0.1);
  }

  .pantry-item:active { cursor: grabbing; }

  .pantry-item.low-stock {
    background: #fdf7ec;
    border-color: var(--gold);
  }

  .pantry-item.out-of-stock {
    background: #f9f0ec;
    border-color: var(--rust);
    opacity: 0.6;
  }

  .item-emoji { font-size: 15px; flex-shrink: 0; }

  .item-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }

  .chip-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
    flex-shrink: 0;
  }

  .chip-qty {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .item-qty {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .qty-btn {
    width: 22px;
    height: 28px;
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
    line-height: 1;
  }

  .qty-btn:hover { color: var(--brown); }

  .pantry-item .btn-danger {
    background: none;
    color: var(--rust);
    border: 1px solid transparent;
    padding: 2px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
    height: 22px;
    display: flex;
    align-items: center;
  }

  .pantry-item .btn-danger:hover { border-color: var(--rust); }

  /* ── ADD ITEM MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.6);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 36px 40px;
    width: 480px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    margin-bottom: 28px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--brown); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* ── RECIPES ── */
  .recipe-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .recipe-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .recipe-card:hover {
    border-color: var(--brown);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--shadow);
  }

  .recipe-card-category {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 8px;
  }

  .recipe-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .recipe-card-meta {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .recipe-card-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .recipe-pantry-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    margin-top: 12px;
  }

  .badge-can-make { background: #e8f0e4; color: var(--sage); }
  .badge-missing { background: #fdf0e8; color: var(--gold); }

  .recipe-missing-ingredients {
    margin-top: 12px;
    padding: 12px 14px;
    background: #fdf7f0;
    border: 1px solid var(--gold);
    border-radius: 8px;
  }

  .recipe-missing-title {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .recipe-missing-list {
    margin: 0;
    padding-left: 18px;
    font-size: 12px;
    color: var(--ink);
    line-height: 1.6;
  }

  /* ── RECIPE DETAIL ── */
  .recipe-detail {
    display: none;
  }

  .recipe-detail.active { display: block; }

  .recipe-detail-header {
    margin-bottom: 36px;
  }

  .recipe-detail-back {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .recipe-detail-back:hover { color: var(--brown); }

  .recipe-detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .recipe-detail-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .recipe-detail-body {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 48px;
  }

  .recipe-ingredients-panel { }

  .recipe-ingredients-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .recipe-ingredient-item {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid rgba(212,201,181,0.5);
    font-size: 12px;
  }

  .recipe-ingredient-name { color: var(--ink); }
  .recipe-ingredient-qty { color: var(--muted); }

  .recipe-steps-panel { }

  .recipe-steps-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .recipe-step {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }

  .recipe-step-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--brown);
    line-height: 1.2;
    flex-shrink: 0;
    width: 30px;
    text-align: right;
  }

  .recipe-step-text {
    font-size: 13px;
    line-height: 1.8;
    padding-top: 4px;
  }

  .recipe-notes {
    margin-top: 32px;
    padding: 20px;
    background: var(--parchment);
    border-left: 3px solid var(--gold);
  }

  .recipe-notes-title {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .recipe-detail-actions {
    display: flex;
    gap: 10px;
    margin-top: 32px;
    flex-wrap: wrap;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  /* ── GROCERY LIST ── */
  .grocery-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 32px;
  }

  .grocery-list-area { }

  .grocery-category-group { margin-bottom: 28px; }

  .grocery-category-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .grocery-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--warm-white);
    border: 1px solid var(--border);
    margin-bottom: 2px;
    transition: all 0.2s;
  }

  .grocery-item.checked {
    opacity: 0.4;
    text-decoration: line-through;
  }

  .grocery-checkbox {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }

  .grocery-checkbox.checked {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }

  .grocery-item-name { flex: 1; font-size: 13px; }
  .grocery-item-qty { font-size: 11px; color: var(--muted); }

  .grocery-sidebar { }

  .grocery-sidebar-section {
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 14px;
  }

  .grocery-sidebar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    margin-bottom: 14px;
  }

  .quick-add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .quick-add-input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: var(--cream);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
  }

  /* ── RECIPE CARD PRINT ── */

    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.7);
    z-index: 300;

  .print-card {

<script>
// ── STATE ──
const SESSION_PASS = 'kitchen_authenticated';

// ── AUTH ──
const PASS_KEY = 'kitchen_pw_hash';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderPantry();
  renderRecipes();
  renderGrocery();
  // Load pantry from JSON file (same approach as recipes) and overwrite localStorage
  fetch('pantry.json?v=' + Date.now())
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const pantry = Array.isArray(data) ? data : (data && data.pantry) || [];
      localStorage.setItem('kitchen_pantry', JSON.stringify(pantry));
      renderPantry();
    })
    .catch(() => {});
}

async function doSetup() {
  const pw = document.getElementById('setup-password').value;
  const confirm = document.getElementById('setup-password-confirm').value;
  const err = document.getElementById('setup-error');

  if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
  if (pw !== confirm) { err.textContent = 'Passwords do not match.'; return; }

  const hash = await sha256(pw);
  localStorage.setItem(PASS_KEY, hash);
  enterApp();
}

async function doLogin() {
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');

  const storedHash = localStorage.getItem(PASS_KEY);
  const inputHash = await sha256(pw);

  if (inputHash !== storedHash) {
    err.textContent = 'Incorrect password.';
    return;
  }
  enterApp();
}

async function doChangePassword() {
  const current = prompt('Current password:');
  if (!current) return;
  const storedHash = localStorage.getItem(PASS_KEY);
  const currentHash = await sha256(current);
  if (currentHash !== storedHash) { toast('Incorrect current password'); return; }

  const newPw = prompt('New password (min 6 characters):');
  if (!newPw || newPw.length < 6) { toast('Password too short'); return; }
  const confirm = prompt('Confirm new password:');
  if (newPw !== confirm) { toast('Passwords do not match'); return; }

  const newHash = await sha256(newPw);
  localStorage.setItem(PASS_KEY, newHash);
  toast('Password updated');
}

// Show setup or login depending on whether a password hash exists
(function initAuth() {
  if (localStorage.getItem(PASS_KEY)) {
    document.getElementById('login-card').style.display = 'block';
  } else {
    document.getElementById('setup-card').style.display = 'block';
  }
})();

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('login-card').style.display !== 'none') doLogin();
  if (document.getElementById('setup-card').style.display !== 'none') doSetup();
});

// ── DATA ──
function getData() {
  return {
    pantry: JSON.parse(localStorage.getItem('kitchen_pantry') || '[]'),
    recipes: JSON.parse(localStorage.getItem('kitchen_recipes') || '[]'),
    grocery: JSON.parse(localStorage.getItem('kitchen_grocery') || '[]'),
  };
}

function saveData(key, val) {
  localStorage.setItem('kitchen_' + key, JSON.stringify(val));
}

// ── NAV ──
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(name.substring(0,5))) b.classList.add('active');
  });
  if (name === 'grocery') renderGrocery();
}

// ── MODAL ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── PANTRY ──
const HIDDEN_CATEGORIES_KEY = 'kitchen_hidden_categories';
const COLLAPSED_CATEGORIES_KEY = 'kitchen_collapsed_categories';
const COLLAPSED_SUBCATEGORIES_KEY = 'kitchen_collapsed_subcategories';

function getHiddenCategories() {
  try {
    const raw = localStorage.getItem(HIDDEN_CATEGORIES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function setHiddenCategories(arr) {
  localStorage.setItem(HIDDEN_CATEGORIES_KEY, JSON.stringify(arr));
}

function getCollapsedCategories() {
  try {
    const raw = localStorage.getItem(COLLAPSED_CATEGORIES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function setCollapsedCategories(arr) {
  localStorage.setItem(COLLAPSED_CATEGORIES_KEY, JSON.stringify(arr));
}

function getCollapsedSubcategories() {
  try {
    const raw = localStorage.getItem(COLLAPSED_SUBCATEGORIES_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function setCollapsedSubcategories(arr) {
  localStorage.setItem(COLLAPSED_SUBCATEGORIES_KEY, JSON.stringify(arr));
}

function subcatKey(cat, subcat) { return cat + '|' + (subcat || ''); }

function toggleSubcategoryCollapsed(cat, subcat) {
  const key = subcatKey(cat, subcat);
  const collapsed = getCollapsedSubcategories();
  const i = collapsed.indexOf(key);
  if (i >= 0) collapsed.splice(i, 1);
  else collapsed.push(key);
  setCollapsedSubcategories(collapsed);
  renderPantry();
}

function toggleSubcategoryByKey(key) {
  const idx = key.indexOf('|');
  const cat = idx >= 0 ? key.slice(0, idx) : key;
  const subcat = idx >= 0 ? key.slice(idx + 1) : null;
  toggleSubcategoryCollapsed(cat, subcat || null);
}

function toggleCategoryVisible(cat) {
  const hidden = getHiddenCategories();
  const i = hidden.indexOf(cat);
  if (i >= 0) hidden.splice(i, 1);
  else hidden.push(cat);
  setHiddenCategories(hidden);
  renderPantry();
  renderCategoriesPanel();
}

function toggleCategoryCollapsed(cat) {
  const collapsed = getCollapsedCategories();
  const i = collapsed.indexOf(cat);
  if (i >= 0) collapsed.splice(i, 1);
  else collapsed.push(cat);
  setCollapsedCategories(collapsed);
  renderPantry();
}

function toggleCategoriesPanel() {
  const panel = document.getElementById('pantry-categories-panel');
  if (!panel) return;
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderCategoriesPanel();
}

function renderCategoriesPanel() {
  const panel = document.getElementById('pantry-categories-panel');
  if (!panel) return;
  const data = getData();
  const allCats = [...new Set(data.pantry.map(i => (i.category || 'Other').trim()).filter(Boolean))].sort();
  const hidden = getHiddenCategories();
  panel.innerHTML = '';
  allCats.forEach(cat => {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !hidden.includes(cat);
    cb.dataset.category = cat;
    cb.onchange = () => { toggleCategoryVisible(cat); };
    label.appendChild(cb);
    label.appendChild(document.createTextNode(' ' + cat));
    panel.appendChild(label);
  });
}

function getStockStatus(item) {
  if (item.qty <= 0) return 'out';
  if (item.qty <= (item.threshold || 1)) return 'low';
  return 'ok';
}

function refreshPantryCategoryFilter() {
  const data = getData();
  const sel = document.getElementById('pantry-category-filter');
  if (!sel) return;
  const prev = sel.value;
  const categories = [...new Set(data.pantry.map(i => (i.category || 'Other').trim()).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All Categories</option>' + categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (prev && categories.includes(prev)) sel.value = prev;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function renderPantry(items) {
  refreshPantryCategoryFilter();
  const data = getData();
  const all = items || data.pantry;
  const grid = document.getElementById('pantry-grid');
  if (!all.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">🥫</div>
      <div class="empty-state-title">Your pantry is empty</div>
      <div class="empty-state-text">Add ingredients to track what you have on hand.</div>
    </div>`;
    return;
  }
  const byCategory = {};
  all.forEach(item => {
    const cat = (item.category || 'Other').trim() || 'Other';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(item);
  });
  const hidden = getHiddenCategories();
  const collapsed = getCollapsedCategories();
  const collapsedSub = getCollapsedSubcategories();
  const sortedCats = Object.keys(byCategory).sort().filter(cat => !hidden.includes(cat));

  function chipHtml(item) {
    const status = getStockStatus(item);
    const stapleClass = item.isStaple ? 'is-staple' : '';

    return `<div class="pantry-item ${status === 'low' ? 'low-stock' : ''} ${status === 'out' ? 'out-of-stock' : ''} ${stapleClass}" draggable="true">
    <span class="item-emoji">${item.emoji || '📦'}</span>
    <span class="item-name" onclick="toggleStaple(${item.id})" style="cursor:pointer" title="Click to toggle Staple status">
      ${item.isStaple ? '<span style="color:var(--gold); font-size:10px;">★</span> ' : ''}${item.name}
    </span>
    <div class="chip-sep"></div>
    <span class="chip-qty"><span class="qty-value">${item.qty}</span>${item.unit ? ' ' + item.unit : ''}</span>
    <div class="item-qty">
      <button class="qty-btn" onclick="adjustQty(${item.id}, -1)">−</button>
      <button class="qty-btn" onclick="adjustQty(${item.id}, 1)">+</button>
    </div>
    <button class="btn-danger" onclick="removePantryItem(${item.id})">×</button>
  </div>`;
  }

  grid.innerHTML = sortedCats.map(cat => {
    const categoryItems = byCategory[cat];
    const bySubcat = {};
    categoryItems.forEach(item => {
      const sub = (item.subcategory || '').trim() || '—';
      if (!bySubcat[sub]) bySubcat[sub] = [];
      bySubcat[sub].push(item);
    });
    const sortedSubcats = Object.keys(bySubcat).sort((a, b) => (a === '—' ? 1 : b === '—' ? -1 : a.localeCompare(b)));
    const isCatCollapsed = collapsed.includes(cat);
    const catEscaped = escapeHtml(cat);
    const catAttr = catEscaped.replace(/"/g, '&quot;');

    const subcategoryBlocks = sortedSubcats.map(subcat => {
      const subItems = bySubcat[subcat];
      const key = subcatKey(cat, subcat);
      const isSubCollapsed = collapsedSub.includes(key);
      const subEscaped = escapeHtml(subcat);
      const subAttr = escapeHtml(key).replace(/"/g, '&quot;');
      const chipsHtml = subItems.map(chipHtml).join('');
      return `<div class="pantry-subcategory-group ${isSubCollapsed ? 'collapsed' : ''}" data-subcat-key="${subAttr}">
        <div class="pantry-subcategory-title" role="button" tabindex="0" aria-expanded="${!isSubCollapsed}" data-subcat-key="${subAttr}" onclick="toggleSubcategoryByKey(this.getAttribute('data-subcat-key'))">
          <span class="pantry-subcategory-chevron" aria-hidden="true">▼</span>
          <span>${subEscaped}</span>
        </div>
        <div class="pantry-grid">${chipsHtml}</div>
      </div>`;
    }).join('');

    return `<div class="pantry-category-group ${isCatCollapsed ? 'collapsed' : ''}" data-category="${catAttr}">
      <div class="pantry-category-title" role="button" tabindex="0" aria-expanded="${!isCatCollapsed}" data-category="${catAttr}" onclick="toggleCategoryCollapsed(this.getAttribute('data-category'))">
        <span class="pantry-category-chevron" aria-hidden="true">▼</span>
        <span>${catEscaped}</span>
      </div>
      <div class="pantry-category-body">${subcategoryBlocks}</div>
    </div>`;
  }).join('');
}

function filterPantry(search) {
  const data = getData();
  let items = data.pantry;
  const q = (search || document.querySelector('.search-input')?.value || '').toLowerCase();
  const cat = document.getElementById('pantry-category-filter')?.value;
  const stock = document.getElementById('pantry-stock-filter')?.value;
  if (q) items = items.filter(i => i.name.toLowerCase().includes(q));
  if (cat) items = items.filter(i => i.category === cat);
  if (stock) items = items.filter(i => getStockStatus(i) === stock);
  renderPantry(items);
}

function addPantryItem() {
  const name = document.getElementById('new-item-name').value.trim();
  if (!name) { toast('Please enter an item name'); return; }
  const data = getData();
  const subcategoryEl = document.getElementById('new-item-subcategory');
  const item = {
    id: Date.now(),
    name,
    emoji: document.getElementById('new-item-emoji').value || '📦',
    category: document.getElementById('new-item-category').value,
    subcategory: subcategoryEl ? subcategoryEl.value.trim() : '',
    unit: document.getElementById('new-item-unit').value.trim(),
    qty: parseFloat(document.getElementById('new-item-qty').value) || 0,
    threshold: parseFloat(document.getElementById('new-item-threshold').value) || 1,
  };
  data.pantry.push(item);
  saveData('pantry', data.pantry);
  closeModal('add-pantry-modal');
  document.getElementById('new-item-name').value = '';
  document.getElementById('new-item-emoji').value = '';
  if (subcategoryEl) subcategoryEl.value = '';
  document.getElementById('new-item-unit').value = '';
  document.getElementById('new-item-qty').value = '1';
  renderPantry();
  toast(`${item.name} added to pantry`);
}

function adjustQty(id, delta) {
  const data = getData();
  const item = data.pantry.find(i => i.id === id);
  if (!item) return;

  item.qty = Math.max(0, (item.qty || 0) + delta);
  saveData('pantry', data.pantry);

  // If a staple hits 0 (or goes below threshold), add to grocery
  if (item.isStaple && item.qty === 0) {
    addStapleToGrocery(item);
  }

  filterPantry();
}

function addStapleToGrocery(item) {
  const data = getData();
  const alreadyListed = data.grocery.some(g => g.name.toLowerCase() === item.name.toLowerCase() && !g.checked);

  if (!alreadyListed) {
    data.grocery.push({
      id: Date.now() + Math.random(),
      name: item.name,
      qty: 'Refill (Staple)',
      category: item.category || 'Staples',
      checked: false
    });
    saveData('grocery', data.grocery);
    toast(`🛒 ${item.name} added to Grocery List`);
  }
}

function toggleStaple(id) {
  const data = getData();
  const item = data.pantry.find(i => i.id === id);
  if (item) {
    item.isStaple = !item.isStaple;
    saveData('pantry', data.pantry);
    renderPantry();
    toast(`${item.name} is now ${item.isStaple ? 'a staple' : 'not a staple'}`);
  }
}

function removePantryItem(id) {
  const data = getData();
  data.pantry = data.pantry.filter(i => i.id !== id);
  saveData('pantry', data.pantry);
  filterPantry();
  toast('Item removed');
}

// ── RECIPES ──
function canMakeRecipe(recipe) {
  const pantry = getData().pantry;
  if (!recipe.ingredients || !recipe.ingredients.length) return false;
  return recipe.ingredients.every(ing => {
    const name = (typeof ing === 'string' ? ing : ing.name || '').toLowerCase();
    return pantry.some(p => p.name.toLowerCase().includes(name.split(' ').pop()) && p.qty > 0);
  });
}

function getMissingIngredients(recipe) {
  const pantry = getData().pantry.filter(p => p.qty > 0);
  const missing = [];
  (recipe.ingredients || []).forEach(ing => {
    const text = typeof ing === 'string' ? ing : `${ing.qty || ''} ${ing.unit || ''} ${ing.name}`.trim();
    const name = (typeof ing === 'string' ? ing : ing.name || '').toLowerCase();
    const hasIt = name && pantry.some(p => p.name.toLowerCase().includes(name.split(' ').pop()));
    if (name && !hasIt) missing.push(text);
  });
  return missing;
}

function renderRecipes(items) {
  const data = getData();
  const all = items || data.recipes;
  const grid = document.getElementById('recipe-grid');
  if (!all.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">📖</div>
      <div class="empty-state-title">No recipes yet</div>
      <div class="empty-state-text">Add your own recipes or create one from the + Add Recipe button.</div>
    </div>`;
  } else {
    const canMake = r => canMakeRecipe(r);
    grid.innerHTML = all.map(r => {
      const make = canMake(r);
      return `<div class="recipe-card" onclick="showRecipeDetail(${r.id})">
        <div class="recipe-card-category">${r.category || 'Recipe'}</div>
        <div class="recipe-card-title">${r.title}</div>
        <div class="recipe-card-meta">
          ${r.prepTime ? `<span>Prep: ${r.prepTime}</span>` : ''}
          ${r.cookTime ? `<span>Cook: ${r.cookTime}</span>` : ''}
          ${r.servings ? `<span>Serves: ${r.servings}</span>` : ''}
        </div>
        ${r.description ? `<div class="recipe-card-desc">${r.description}</div>` : ''}
        <div>
          <span class="recipe-pantry-badge ${make ? 'badge-can-make' : 'badge-missing'}">
            ${make ? '✓ Can make now' : '○ Missing some ingredients'}
          </span>
        </div>
      </div>`;
    }).join('');
  }
  // Update grocery sidebar
  const recipeList = document.getElementById('recipe-to-grocery-list');
  if (recipeList) {
    if (!data.recipes.length) {
      recipeList.innerHTML = '<span style="font-size:11px;color:var(--muted)">No recipes saved yet.</span>';
    } else {
      recipeList.innerHTML = data.recipes.map(r =>
        `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:12px">${r.title}</span>
          <button class="btn-secondary" style="padding:3px 8px;font-size:9px" onclick="addRecipeToGrocery(${r.id})">Add</button>
        </div>`
      ).join('');
    }
  }
}

function filterRecipes(search) {
  const data = getData();
  let items = data.recipes;
  const q = (search || '').toLowerCase() || '';
  const cat = document.getElementById('recipe-filter')?.value;
  const pantryOnly = document.getElementById('recipe-pantry-filter')?.value === 'can_make';
  if (q) items = items.filter(r => r.title.toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q));
  if (cat) items = items.filter(r => r.category === cat);
  if (pantryOnly) items = items.filter(r => canMakeRecipe(r));
  renderRecipes(items);
}

function addRecipe(recipeData) {
  const data = getData();
  const recipe = recipeData || {
    id: Date.now(),
    title: document.getElementById('new-recipe-title').value.trim(),
    category: document.getElementById('new-recipe-category').value,
    servings: parseInt(document.getElementById('new-recipe-servings').value) || 4,
    prepTime: document.getElementById('new-recipe-prep').value.trim(),
    cookTime: document.getElementById('new-recipe-cook').value.trim(),
    description: document.getElementById('new-recipe-desc').value.trim(),
    ingredients: document.getElementById('new-recipe-ingredients').value.trim().split('\n').filter(Boolean),
    steps: document.getElementById('new-recipe-steps').value.trim().split('\n').filter(Boolean),
    notes: document.getElementById('new-recipe-notes').value.trim(),
    createdAt: new Date().toLocaleDateString(),
    aiGenerated: false,
  };
  if (!recipe.title) { toast('Please enter a recipe title'); return; }
  data.recipes.push(recipe);
  saveData('recipes', data.recipes);
  if (!recipeData) {
    closeModal('add-recipe-modal');
    ['title','desc','prep','cook','ingredients','steps','notes'].forEach(f => {
      const el = document.getElementById('new-recipe-' + f);
      if (el) el.value = '';
    });
  }
  renderRecipes();
  toast(`"${recipe.title}" saved!`);
  return recipe;
}

function showRecipeDetail(id) {
  const data = getData();
  const recipe = data.recipes.find(r => r.id === id);
  if (!recipe) return;
  document.getElementById('recipes-list-view').style.display = 'none';
  const detail = document.getElementById('recipe-detail-view');
  detail.classList.add('active');
  const canMake = canMakeRecipe(recipe);
  const missingIngredients = getMissingIngredients(recipe);
  const missingSection = !canMake && missingIngredients.length ? `
    <div class="recipe-missing-ingredients">
      <div class="recipe-missing-title">Missing from pantry</div>
      <ul class="recipe-missing-list">
        ${missingIngredients.map(ing => `<li>${escapeHtml(ing)}</li>`).join('')}
      </ul>
    </div>
  ` : '';
  detail.querySelector('#recipe-detail-content').innerHTML = `
    <div class="recipe-detail-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px">
        <div>
          <div style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">${recipe.category}</div>
          <div class="recipe-detail-title">${recipe.title}</div>
          <div class="recipe-detail-meta">
            ${recipe.prepTime ? `<span>Prep: ${recipe.prepTime}</span>` : ''}
            ${recipe.cookTime ? `<span>Cook: ${recipe.cookTime}</span>` : ''}
            ${recipe.servings ? `<span>Serves: ${recipe.servings}</span>` : ''}
            <span class="recipe-pantry-badge ${canMake ? 'badge-can-make' : 'badge-missing'}" style="margin:0">${canMake ? '✓ Can make now' : '○ Missing ingredients'}</span>
          </div>
          ${missingSection}
          ${recipe.description ? `<p style="margin-top:12px;font-size:13px;color:var(--muted);line-height:1.7">${recipe.description}</p>` : ''}
        </div>
      </div>
    </div>
    <div class="recipe-detail-body">
      <div class="recipe-ingredients-panel">
        <div class="recipe-ingredients-title">Ingredients</div>
        ${(recipe.ingredients || []).map(ing => {
          const text = typeof ing === 'string' ? ing : `${ing.qty || ''} ${ing.unit || ''} ${ing.name}`.trim();
          const parts = text.match(/^([\d\s\/\.]+\s*(?:cup|tbsp|tsp|oz|lb|lbs|g|kg|ml|l|cups|tablespoon|teaspoon|pound|ounce|pinch|handful|can|clove|cloves|slice|slices|bunch|bunch|head|heads|piece|pieces|medium|large|small)?s?\.?\s+)?(.+)$/i);
          return `<div class="recipe-ingredient-item">
            <span class="recipe-ingredient-name">${parts ? (parts[2]||text) : text}</span>
            <span class="recipe-ingredient-qty">${parts ? (parts[1]||'') : ''}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="recipe-steps-panel">
        <div class="recipe-steps-title">Instructions</div>
        ${(recipe.steps || []).map((step, i) =>
          `<div class="recipe-step">
            <div class="recipe-step-num">${i+1}</div>
            <div class="recipe-step-text">${step}</div>
          </div>`
        ).join('')}
        ${recipe.notes ? `<div class="recipe-notes"><div class="recipe-notes-title">Notes</div><div style="font-size:12px;line-height:1.7">${recipe.notes}</div></div>` : ''}
      </div>
    </div>
    <div class="recipe-detail-actions">
      <button class="btn-primary" onclick="openPrintPreview(${id})">Print Recipe Card</button>
      <button class="btn-secondary" onclick="addRecipeToGrocery(${id})">+ Add to Grocery List</button>
      <button class="btn-danger" onclick="deleteRecipe(${id})" style="margin-left:auto">Delete Recipe</button>
    </div>
  `;
}

function backToRecipes() {
  document.getElementById('recipes-list-view').style.display = 'block';
  document.getElementById('recipe-detail-view').classList.remove('active');
  renderRecipes();
}

function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  const data = getData();
  const r = data.recipes.find(r => r.id === id);
  data.recipes = data.recipes.filter(r => r.id !== id);
  saveData('recipes', data.recipes);
  backToRecipes();
  toast(`"${r?.title}" deleted`);
}

// ── GROCERY ──
function renderGrocery() {
  const data = getData();
  const list = document.getElementById('grocery-list');
  const summary = document.getElementById('grocery-summary');
  if (!data.grocery.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🛒</div>
      <div class="empty-state-title">Your grocery list is empty</div>
      <div class="empty-state-text">Add items manually or pull ingredients from a recipe.</div>
    </div>`;
    if (summary) summary.innerHTML = '';
    return;
  }
  const byCategory = {};
  data.grocery.forEach(item => {
    const cat = item.category || 'Other';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(item);
  });
  list.innerHTML = Object.entries(byCategory).map(([cat, items]) =>
    `<div class="grocery-category-group">
      <div class="grocery-category-title">${cat}</div>
      ${items.map(item => `
        <div class="grocery-item ${item.checked ? 'checked' : ''}" id="grocery-${item.id}">
          <div class="grocery-checkbox ${item.checked ? 'checked' : ''}" onclick="toggleGroceryItem(${item.id})">
            ${item.checked ? '✓' : ''}
          </div>
          <span class="grocery-item-name">${item.name}</span>
          <span class="grocery-item-qty">${item.qty || ''}</span>
          <button class="btn-danger" onclick="removeGroceryItem(${item.id})">×</button>
        </div>
      `).join('')}
    </div>`
  ).join('');
  if (summary) {
    const total = data.grocery.length;
    const checked = data.grocery.filter(i => i.checked).length;
    summary.innerHTML = `${checked} of ${total} items checked off`;
  }
  renderRecipes();
}

function toggleGroceryItem(id) {
  const data = getData();
  const item = data.grocery.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  saveData('grocery', data.grocery);
  renderGrocery();
}

function removeGroceryItem(id) {
  const data = getData();
  data.grocery = data.grocery.filter(i => i.id !== id);
  saveData('grocery', data.grocery);
  renderGrocery();
}

function quickAddItem() {
  const name = document.getElementById('quick-add-name').value.trim();
  if (!name) return;
  const qty = document.getElementById('quick-add-qty').value.trim();
  const data = getData();
  data.grocery.push({ id: Date.now(), name, qty, category: 'Other', checked: false });
  saveData('grocery', data.grocery);
  document.getElementById('quick-add-name').value = '';
  document.getElementById('quick-add-qty').value = '';
  renderGrocery();
}

function addRecipeToGrocery(id) {
  const data = getData();
  const recipe = data.recipes.find(r => r.id === id);
  if (!recipe) return;
  addRecipeIngredientsToGrocery(recipe);
  if (document.getElementById('section-grocery').classList.contains('active')) renderGrocery();
  toast(`Ingredients from "${recipe.title}" added to grocery list`);
}

function addRecipeIngredientsToGrocery(recipe) {
  const data = getData();
  (recipe.ingredients || []).forEach(ing => {
    const text = typeof ing === 'string' ? ing : `${ing.qty||''} ${ing.unit||''} ${ing.name}`.trim();
    const existing = data.grocery.find(g => g.name.toLowerCase() === text.toLowerCase());
    if (!existing) {
      data.grocery.push({ id: Date.now() + Math.random(), name: text, qty: '', category: 'Recipe Ingredients', checked: false });
    }
  });
  saveData('grocery', data.grocery);
}

function clearChecked() {
  const data = getData();
  data.grocery = data.grocery.filter(i => !i.checked);
  saveData('grocery', data.grocery);
  renderGrocery();
  toast('Checked items cleared');
}

function clearAll() {
  if (!confirm('Clear the entire grocery list?')) return;
  saveData('grocery', []);
  renderGrocery();
  toast('Grocery list cleared');
}

function printGrocery() {
  const data = getData();
  const byCategory = {};
  data.grocery.filter(i => !i.checked).forEach(item => {
    const cat = item.category || 'Other';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(item);
  });
  const html = `<div style="font-family:'DM Mono',monospace;padding:32px;max-width:600px;margin:0 auto">
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;margin-bottom:4px">Grocery List</h1>
    <p style="color:#8a7968;font-size:11px;margin-bottom:24px">${new Date().toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
    ${Object.entries(byCategory).map(([cat, items]) => `
      <div style="margin-bottom:20px">
        <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#8a7968;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #d4c9b5">${cat}</div>
        ${items.map(i => `<div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid #f5f0e8;font-size:13px"><span style="flex:1">${i.name}</span><span style="color:#8a7968">${i.qty||''}</span></div>`).join('')}
      </div>
    `).join('')}
  </div>`;
  const w = window.open('', '', 'width=700,height=800');
  w.document.write(`<html><head><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet"></head><body>${html}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

// ── PRINT RECIPE CARD ──
function openPrintPreview(id) {
  const data = getData();
  const recipe = data.recipes.find(r => r.id === id);
  if (!recipe) return;
  document.getElementById('print-card-content').innerHTML = `
    <div class="print-header">
      <div class="print-category">${recipe.category || 'Recipe'}</div>
      <div class="print-title">${recipe.title}</div>
      <div class="print-meta">
        ${recipe.prepTime ? `<span>Prep: ${recipe.prepTime}</span>` : ''}
        ${recipe.cookTime ? `<span>Cook: ${recipe.cookTime}</span>` : ''}
        ${recipe.servings ? `<span>Serves: ${recipe.servings}</span>` : ''}
        ${recipe.aiGenerated ? `<span>✦ AI Generated</span>` : ''}
      </div>
      ${recipe.description ? `<p style="margin-top:14px;font-size:14px;color:#6b4c35;font-style:italic;line-height:1.6">${recipe.description}</p>` : ''}
    </div>
    <div class="print-body">
      <div>
        <div class="print-ingredients-title">Ingredients</div>
        ${(recipe.ingredients||[]).map(ing => {
          const text = typeof ing === 'string' ? ing : `${ing.qty||''} ${ing.unit||''} ${ing.name}`.trim();
          const m = text.match(/^([\d\s\/\.]+\s*(?:cup|tbsp|tsp|oz|lb|lbs|g|kg|ml|l|cups|tablespoon|teaspoon|pound|ounce|pinch|handful|can|clove|cloves|slices?|bunch|head|pieces?|medium|large|small)?s?\.?\s+)?(.+)$/i);
          return `<div class="print-ingredient"><span>${m?(m[2]||text):text}</span><span style="color:#8a7968">${m?(m[1]||''):''}</span></div>`;
        }).join('')}
      </div>
      <div>
        <div class="print-steps-title">Instructions</div>
        ${(recipe.steps||[]).map((step, i) => `<div class="print-step"><span class="print-step-num">${i+1}</span><span>${step}</span></div>`).join('')}
        ${recipe.notes ? `<div style="margin-top:20px;padding:14px;background:#ede5d4;border-left:2px solid #c9913d;font-size:13px;line-height:1.7"><strong style="font-size:10px;font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;color:#c9913d">Notes<br></strong>${recipe.notes}</div>` : ''}
      </div>
    </div>
    <div class="print-footer">
      <span>Shay's Kitchen</span>
      <span>${recipe.createdAt || ''}</span>
    </div>
  `;
  document.getElementById('print-preview').classList.add('open');
}

function closePrint() {
  document.getElementById('print-preview').classList.remove('open');
}

// ── EXPORT / IMPORT ──
function exportData() {
  const data = getData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `shays-kitchen-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('Data exported!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.pantry) saveData('pantry', data.pantry);
      if (data.recipes) saveData('recipes', data.recipes);
      if (data.grocery) saveData('grocery', data.grocery);
      renderPantry(); renderRecipes(); renderGrocery();
      toast('Data imported successfully!');
    } catch {
      toast('Error importing data — check file format');
    }
  };
  reader.readAsText(file);
}
